<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EnteleKRON Ecosystem Animation</title>
  <link rel="stylesheet" href="./ecosystem-cyber-coin.css" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #f0f9ff 0%, #f8fafc 45%, #f1f5f9 100%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .page { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
    h1 { text-align: center; font-size: clamp(1.25rem, 2.5vw, 1.75rem); color: #0f172a; margin: 0 0 0.5rem; }
    p.lead { text-align: center; color: #475569; margin: 0 0 1rem; font-size: 0.95rem; }
    .footer-note { margin-top: 1rem; text-align: center; font-size: 0.8rem; color: #64748b; }
    .footer-note a { color: #0284c7; }
  </style>
</head>
<body>
  <div class="page">
    <h1>EnteleKRON Ecosystem Layer</h1>
    <p class="lead">28 official ecosystem modules · EnteleKRON / TVK Group</p>
    <div id="root"></div>
    <p class="footer-note">
      Portable animation bundle ·
      <a href="https://www.entelescan.com/">entelescan.com</a> ·
      <a href="https://www.entelekron.io/">entelekron.io</a> ·
      <a href="https://www.tvk.group/">tvk.group</a>
    </p>
  </div>
  <script src="/assets/js/ecosystem-animation.js"></script>
  <script>initEcosystemAnimation(document.getElementById("root"));</script>
</body>
</html>
